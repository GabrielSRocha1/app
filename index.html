<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Verum Finanças</title>
    <link rel="manifest" href="./manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Verum Finanças">
    <meta name="application-name" content="Verum Finanças">
    <meta name="msapplication-TileColor" content="#0a0a0a">
    <meta name="theme-color" content="#0a0a0a">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        /* =============================================
           BASE
        ============================================= */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #000000;
            color: #ffffff;
            -webkit-tap-highlight-color: transparent;
            overflow: hidden;
            min-width: 320px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            height: 100vh;
        }

        /* =============================================
           PAGE WIDTH CONSTRAINT
        ============================================= */
        #root {
            width: 100%;
            height: 100%;
            max-width: 620px;
            min-width: 320px;
            background-color: #0a0a0a;
            position: relative;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8);
            border-left: 1px solid rgba(255, 255, 255, 0.03);
            border-right: 1px solid rgba(255, 255, 255, 0.03);
            overflow: hidden;
        }

        /* =============================================
           TYPOGRAPHY SYSTEM
           H1 → 30px / Extra Bold (800)
           H2 → 24px / Bold (700)
           H3 → 16px / Medium (500)
           H4 → 14px / Regular (400)
           H5 → 12px / Regular (400)
        ============================================= */
        h1,
        .text-h1 {
            font-size: 30px !important;
            font-weight: 800 !important;
            line-height: 1.2;
        }

        h2,
        .text-h2 {
            font-size: 24px !important;
            font-weight: 700 !important;
            line-height: 1.25;
        }

        h3,
        .text-h3 {
            font-size: 16px !important;
            font-weight: 500 !important;
            line-height: 1.4;
        }

        h4,
        .text-h4 {
            font-size: 14px !important;
            font-weight: 400 !important;
            line-height: 1.5;
        }

        h5,
        .text-h5 {
            font-size: 12px !important;
            font-weight: 400 !important;
            line-height: 1.5;
        }

        /* =============================================
           INPUTS — PLACEHOLDER COR CINZA CLARO
        ============================================= */
        input::placeholder,
        textarea::placeholder,
        select::placeholder {
            color: #9ca3af !important;
            opacity: 1;
        }

        /* =============================================
           CURSOR-POINTER EM TODAS AS ÁREAS CLICÁVEIS
        ============================================= */
        button,
        a,
        [role="button"],
        label,
        select,
        input[type="checkbox"],
        input[type="radio"],
        [onClick] {
            cursor: pointer;
        }

        /* =============================================
           HOVER EFFECT EM BOTÕES
        ============================================= */
        button:not(:disabled) {
            transition: opacity 0.2s ease, transform 0.15s ease, background-color 0.2s ease, box-shadow 0.2s ease;
        }

        button:not(:disabled):hover {
            opacity: 0.9;
        }

        button:not(:disabled):active {
            transform: scale(0.97);
        }

        /* =============================================
           SCROLLBAR
        ============================================= */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* =============================================
           ANIMATIONS
        ============================================= */
        @keyframes scaleIn {
            from {
                transform: scale(0.9);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .animate-scale-in {
            animation: scaleIn 0.3s ease-out forwards;
        }

        @keyframes slideUp {
            from {
                transform: translateY(100%);
            }

            to {
                transform: translateY(0);
            }
        }

        .animate-slide-up {
            animation: slideUp 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .safe-area-bottom {
            padding-bottom: env(safe-area-inset-bottom);
        }

        /* =============================================
           DROPDOWN — FECHAR AO CLICAR FORA
           (via JS; aqui apenas estilo base)
        ============================================= */
        .dropdown-menu {
            position: absolute;
            z-index: 100;
            background: #111;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 8px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
            animation: scaleIn 0.2s ease-out;
        }

        .dropdown-menu.hidden {
            display: none;
        }

        /* =============================================
           RESPONSIVIDADE — TABLET (≥ 480px)
        ============================================= */
        @media (min-width: 480px) {

            h1,
            .text-h1 {
                font-size: 30px !important;
            }

            h2,
            .text-h2 {
                font-size: 24px !important;
            }

            h3,
            .text-h3 {
                font-size: 16px !important;
            }
        }

        /* =============================================
           RESPONSIVIDADE — MOBILE (≤ 479px)
        ============================================= */
        @media (max-width: 479px) {

            h1,
            .text-h1 {
                font-size: 26px !important;
            }

            h2,
            .text-h2 {
                font-size: 20px !important;
            }

            h3,
            .text-h3 {
                font-size: 15px !important;
            }

            h4,
            .text-h4 {
                font-size: 13px !important;
            }

            h5,
            .text-h5 {
                font-size: 11px !important;
            }

            /* Padding geral menor no mobile */
            .mobile-px {
                padding-left: 12px;
                padding-right: 12px;
            }
        }

        /* =============================================
           RESPONSIVIDADE — TELAS MUITO PEQUENAS (≤ 359px)
        ============================================= */
        @media (max-width: 359px) {

            h1,
            .text-h1 {
                font-size: 22px !important;
            }

            h2,
            .text-h2 {
                font-size: 18px !important;
            }
        }
    </style>
    <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "@google/genai": "https://esm.sh/@google/genai@^1.40.0",
    "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@^2.95.3",
    "vite": "https://esm.sh/vite@^7.3.1",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.3"
  }
}
</script>
</head>

<body class="bg-[#0a0a0a]">
    <div id="root"></div>
    <script type="module" src="./index.tsx"></script>
</body>

</html>
